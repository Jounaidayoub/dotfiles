unbind r
bind r source-file ~/.tmux.conf

set -g prefix `
unbind C-b
bind ` send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 2000

set -g default-shell /usr/bin/zsh

set -g cursor-style blinking-bar

set-option -g set-clipboard on
setw -g mode-keys vi


set -s extended-keys on


# Renaming
set -wg automatic-rename on
set -g allow-rename off


unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind m resize-pane -Z

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Empty line before status (wrapped to prevent shifting bug on reload)
if-shell '[ "$(tmux show-option -gqv status)" -ne 2 ]' \
  "set -Fg 'status-format[1]' '#{status-format[0]}'; set -g 'status-format[0]' ''; set -g status 2"

# Plugins
set -g @window-name-format 'joshmedeski/tmux-nerd-font-window-name'
# Catppuccin is loaded manually below, not through TPM.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_directory_text " #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_number_color "#{E:@thm_peach}"
set -g @catppuccin_window_current_text "#[fg=#{@thm_peach},bg=#{@thm_surface_1}]#I#[fg=#{@thm_surface_1},bg=#{@thm_peach}] #[fg=#{@thm_mantle},bg=#{@thm_peach}]#{?#{!=:#{window_name},}, #W,}"

set -g @catppuccin_window_number ""
set -g @catppuccin_window_number_color "#{E:@thm_surface_0}"
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=#{@thm_surface_0}] #I#{?#{!=:#{window_name},},  #W,}"

set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags "icon"

#set -g @catppuccin_status_background "default"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "

set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_peach},##{?pane_synchronized,fg=#{@thm_rosewater},fg=#{@thm_peach}}}"
set -g @catppuccin_pane_color "#{@thm_rosewater}"

set -g @catppuccin_date_time_text "%m-%d %H:%M"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Left status
set -g status-left-length 100
set -g status-left '#{E:@catppuccin_status_directory}'

# Right status
set -g status-right-length 100
set -gF status-right '#{E:@catppuccin_status_session}'
# set -agF status-right '#{E:@catppuccin_status_cpu}'
set -agF status-right '#{E:@catppuccin_status_battery}'
set -agF status-right '#[fg=#{@thm_rosewater}]#(salat tmux)'
set -agF status-right '#{E:@catppuccin_status_date_time}'

run-shell '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run-shell '~/.tmux/plugins/tmux-battery/battery.tmux'

# Border status
 setw -g pane-border-status top

# Use Enter in copy-mode to copy to system clipboard via xclip
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "xclip -selection clipboard -i"

# Sync tmux clipboard with system clipboard using xclip for mouse selections
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -selection clipboard -i"
